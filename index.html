<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Focus Technologies | Premium Security</title>
    <style>
        :root { --navy: #0a192f; --gold: #c5a059; --light-navy: #112240; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background-color: var(--navy); color: white; text-align: center; }
        nav { background: var(--light-navy); padding: 25px; border-bottom: 2px solid var(--gold); position: sticky; top: 0; z-index: 100; }
        nav a { color: var(--gold); text-decoration: none; margin: 0 20px; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; }
        header { padding: 80px 20px; }
        .logo { font-size: 5rem; font-weight: 900; letter-spacing: 12px; display: inline-block; position: relative; }
        .target-o { color: var(--gold); display: inline-block; position: relative; border: 4px solid var(--gold); border-radius: 50%; width: 80px; height: 80px; line-height: 75px; vertical-align: middle; }
        .target-o::before { content: ""; position: absolute; top: 50%; left: -10px; right: -10px; height: 2px; background: var(--gold); }
        .target-o::after { content: ""; position: absolute; left: 50%; top: -10px; bottom: -10px; width: 2px; background: var(--gold); }
        .container { max-width: 800px; margin: auto; padding: 40px 20px; }
        .section { background: var(--light-navy); margin-bottom: 50px; border-radius: 15px; border: 1px solid var(--gold); overflow: hidden; text-align: left; }
        .section img { width: 100%; height: 400px; object-fit: cover; border-bottom: 2px solid var(--gold); }
        .content { padding: 40px; }
        h2 { color: var(--gold); font-size: 2.2rem; margin-top: 0; }
        p { font-size: 1.3rem; color: #ccd6f6; line-height: 1.6; }
    </style>
</head>
<body>
<nav>
    <a href="#smart">Smart Access</a>
    <a href="#legacy">Keypads</a>
    <a href="#monitoring">Smart Monitoring</a>
</nav>
<header>
    <div class="logo">F<span class="target-o"></span>CUS</div>
    <p style="color: var(--gold); letter-spacing: 8px;">TECHNOLOGIES</p>
</header>
<div class="container">
    <div id="smart" class="section">
        <img src="image_5eca5e.jpg" alt="Face ID">
        <div class="content">
            <h2>Smart Access</h2>
            <p>Advanced AI-driven biometric facial recognition for premium properties.</p>
        </div>
    </div>
    <div id="legacy" class="section">
        <img src="image_5ec3b7.jpg" alt="Keypad">
        <div class="content">
            <h2>Legacy Systems</h2>
            <p>Industrial-grade keypad and access control infrastructure.</p>
        </div>
    </div>
    <div id="monitoring" class="section">
        <img src="image_5e6cc2.jpg" alt="Monitoring">
        <div class="content">
            <h2>Smart Monitoring</h2>
            <p>Real-time HD surveillance and mobile integration.</p>
        </div>
    </div>
</div>
</body>
</html>
