<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies | Home Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --gold: #c5a059; 
            --dark-blue: #0a192f; 
            --panel: #112240; 
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--dark-blue); 
            color: white; 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        header { 
            padding: 20px 0; 
            text-align: center; 
            border-bottom: 1px solid rgba(197, 160, 89, 0.2); 
            background: linear-gradient(to bottom, #0d1e3a, var(--dark-blue));
            flex-shrink: 0;
        }

        .logo-main { 
            font-family: 'Cinzel', serif; 
            font-size: 3rem; 
            color: var(--gold); 
            letter-spacing: 10px; 
            line-height: 1; 
            margin: 0; 
            text-transform: uppercase; 
            font-weight: 700; 
        }
        
        .target-o { position: relative; display: inline-block; padding: 0 4px; margin: 0 -4px; }
        .target-o::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 48px; height: 48px; border: 2px solid var(--gold); border-radius: 50%; opacity: 1; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        .target-o::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 30px; background: var(--gold); z-index: 1; }
        .target-o span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 30px; height: 2px; background: var(--gold); z-index: 1; display: block; }

        .logo-sub { font-size: 0.85rem; color: var(--gold); letter-spacing: 8px; margin-top: 10px; font-weight: 700; text-transform: uppercase; display: block; }

        nav { display: flex; justify-content: center; gap: 20px; margin-top: 15px; flex-wrap: wrap; }
        .nav-link { color: white; text-decoration: none; font-size: 0.9rem; letter-spacing: 1px; opacity: 0.6; transition: 0.3s; cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 4px; text-transform: uppercase; font-weight: 600; }
        .nav-link.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { 
            flex-grow: 1; 
            max-width: 1200px; 
            margin: 0 auto; 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            width: 100%;
            overflow: hidden;
        }

        .hero-section { 
            display: none; 
            align-items: center; 
            gap: 30px; 
            background: var(--panel); 
            border: 1px solid rgba(197, 160, 89, 0.1); 
            border-radius: 20px; 
            overflow: hidden; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.3); 
            width: 100%;
            max-height: 90%; 
        }
        
        .hero-section.active { display: flex; animation: fadeIn 0.8s ease forwards; }

        .hero-image { flex: 1; height: 100%; min-height: 350px; overflow: hidden; }
        .hero-image img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        .hero-text { flex: 1.2; padding: 40px; text-align: right; }
        .hero-text h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.2rem; margin-bottom: 10px; font-weight: 700; }
        .highlight-text { color: var(--gold); font-size: 1.1rem; display: block; margin-bottom: 15px; font-weight: 700; }
        .hero-text p { font-size: 1.4rem; line-height: 1.6; color: #cbd5e0; font-weight: 400; margin: 0; }

        form { display: flex; flex-direction: column; gap: 10px; width: 100%; margin-top: 15px; }
        input, textarea { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(197, 160, 89, 0.3); padding: 10px; color: white; border-radius: 8px; font-family: inherit; }
        button { background: var(--gold); color: var(--dark-blue); border: none; padding: 12px; font-weight: 700; cursor: pointer; border-radius: 8px; }
