<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies | Home Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark-bg: #050a14; --panel: #0d1626; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        header { padding: 45px 0; text-align: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); background: linear-gradient(to bottom, #0a111f, var(--dark-bg)); }
        .logo-container { display: inline-block; }
        .logo-main { font-family: 'Cinzel', serif; font-size: 3.8rem; color: var(--gold); letter-spacing: 12px; line-height: 1; margin: 0; text-transform: uppercase; font-weight: 700; }
        
        .target-o { position: relative; display: inline-block; padding: 0 4px; margin: 0 -4px; }
        .target-o::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 68px; height: 68px; border: 2px solid var(--gold); border-radius: 50%; opacity: 1; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        .target-o::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 42px; background: var(--gold); z-index: 1; }
        .target-o span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 42px; height: 2px; background: var(--gold); z-index: 1; display: block; }

        .logo-sub { font-size: 1.1rem; color: var(--gold); letter-spacing: 10px; margin-top: 22px; font-weight: 700; text-transform: uppercase; display: block; }

        nav { display: flex; justify-content: center; gap: 45px; margin-top: 35px; }
        .nav-link { color: white; text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .
