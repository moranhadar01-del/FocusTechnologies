<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies | Home Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark-bg: #050a14; --panel: #0d1626; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 0; overflow: hidden; height: 100vh; }

        header { padding: 25px 0; text-align: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); background: linear-gradient(to bottom, #0a111f, var(--dark-bg)); }
        .logo-main { font-family: 'Cinzel', serif; font-size: 3.2rem; color: var(--gold); letter-spacing: 12px; line-height: 1; margin: 0; text-transform: uppercase; font-weight: 700; }
        
        .target-o { position: relative; display: inline-block; padding: 0 4px; margin: 0 -4px; }
        .target-o::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 52px; height: 52px; border: 2px solid var(--gold); border-radius: 50%; opacity: 1; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        .target-o::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 32px; background: var(--gold); z-index: 1; }
        .target-o span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 32px; height: 2px; background: var(--gold); z-index: 1; display: block; }

        .logo-sub { font-size: 0.9rem; color: var(--gold); letter-spacing: 8px; margin-top: 12px; font-weight: 700; text-transform: uppercase; display: block; }

        nav { display: flex; justify-content: center; gap: 35px; margin-top: 20px; }
        .nav-link { color: white; text-decoration: none; font-size: 1.1rem; letter-spacing: 1px; opacity: 0.6; transition: 0.3s; cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .nav-link.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { max-width: 1200px; margin: 30px auto; padding: 0 20px; height: calc(100vh - 250px); display: flex; align-items: center; justify-content: center; }
        .hero-section { display: none; align-items: center; gap: 40px; background: var(--panel); border: 1px solid rgba(197, 160, 89, 0.1); border-radius: 20px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.5); width: 100%; max-height: 100%; }
        .hero-section.active { display: flex; animation: fadeIn 0.8s ease forwards; }

        .hero-image { flex: 1.1; height: 100%; min-height: 400px; overflow: hidden; }
        .hero-image img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.8); }

        .hero-text { flex: 1; padding: 40px; text-align: right; }
        .hero-text h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.4rem; margin-bottom: 10px; font-weight: 700; }
        .highlight-text { color: var(--gold); font-size: 1.1rem; display: block; margin-bottom: 15px; font-weight: 700; }
        .hero-text p { font-size: 1.45rem; line-height: 1.6; color: #cbd5e0; font-weight: 400; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; }
            .hero-section { flex-direction: column; max-height: none; }
            .hero-image { height: 250px; width: 100%; min-height: 250px; }
            .container { height: auto; margin-top: 20px; }
        }
    </style>
</head>
