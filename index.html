<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies</title>
    <style>
        body { font-family: sans-serif; background-color: #0a192f; color: white; text-align: center; margin: 0; padding: 20px; }
        .logo { font-size: 3rem; color: #c5a059; font-weight: bold; margin: 40px 0; letter-spacing: 5px; }
        .container { max-width: 600px; margin: auto; }
        .card { background: #112240; border: 1px solid #c5a059; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
        img { width: 100%; height: auto; display: block; }
        .content { padding: 15px; }
        h2 { color: #c5a059; margin: 10px 0; }
    </style>
</head>
<body>
    <div class="logo">FOC<span>U</span>S</div>
    <div class="container">
        <div class="card">
            <img src="face-id.jpg" alt="Face ID">
            <div class="content"><h2>Smart Access</h2></div>
        </div>
        <div class="card">
            <img src="keypad.jpg" alt="Keypad">
            <div class="content"><h2>Keypads</h2></div>
        </div>
        <div class="card">
            <img src="monitoring.jpg" alt="Monitoring">
            <div class="content"><h2>Smart Monitoring</h2></div>
        </div>
    </div>
</body>
</html>
