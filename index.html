<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a192f; --card: #112240; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        
        /* לוגו מרשים */
        .header { padding: 40px 0; text-align: center; }
        .logo { font-size: 3.5rem; color: var(--gold); font-weight: bold; letter-spacing: 8px; margin: 0; }
        .logo span { border: 2px solid var(--gold); border-radius: 50%; padding: 0 8px; margin: 0 2px; }

        /* טאבים */
        .tabs { display: flex; gap: 10px; margin-bottom: 30px; }
        .tab-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 10px 20px; cursor: pointer; border-radius: 5px; transition: 0.3s; }
        .tab-btn.active { background: var(--gold); color: var(--dark); font-weight: bold; }

        /* תוכן הכרטיס */
        .content-area { width: 90%; max-width: 500px; }
        .card { background: var(--card); border: 1px solid var(--gold); border-radius: 15px; overflow: hidden; display: none; }
        .card.active { display: block; animation: fadeIn 0.5s; }
        .card img { width: 100%; height: 300px; object-fit: cover; border-bottom: 1px solid var(--gold); }
        .card-body { padding: 25px; text-align: center; }
        h2 { color: var(--gold); margin: 0 0 10px 0; }
        p { color: #8892b0; line-height: 1.6; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">FOC<span>U</span>S</h1>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab(event, 'face')">Face ID</button>
        <button class="tab-btn" onclick="openTab(event, 'keypad')">Keypads</button>
        <button class="tab-btn" onclick="openTab(event, 'monitor')">Monitoring</button>
    </div>

    <div class="content-area">
        <div id="face" class="card active">
            <img src="face-id.jpg" alt="Face ID">
            <div class="card-body">
                <h2>Smart Access</h2>
                <p>מערכות זיהוי פנים מתקדמות המבוססות על בינה מלאכותית לאבטחה מקסימלית.</p>
            </div>
        </div>

        <div id="keypad" class="card">
            <img src="keypad.jpg" alt="Keypad">
            <div class="card-body">
                <h2>Secure Keypads</h2>
                <p>לוחות מקשים מעוצבים וחסינים המעניקים שליטה מלאה על נקודות הכניסה.</p>
            </div>
        </div>

        <div id="monitor" class="card">
            <img src="monitoring.jpg" alt="Monitoring">
            <div class="card-body">
                <h2>Smart Monitoring</h2>
                <p>ניטור בזמן אמת ושליטה מרחוק מכל מקום בעולם דרך ממשק מאובטח.</p>
            </div>
        </div>
    </div>

    <script>
        function openTab(evt, tabName) {
            var i, card, tablinks;
            card = document.getElementsByClassName("card");
            for (i = 0; i < card.length; i++) { card[i].classList.remove("active"); }
            tablinks = document.getElementsByClassName("tab-btn");
            for (i = 0; i < tablinks.length; i++) { tablinks[i].classList.remove("active"); }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
