<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FT-Global | Focus Technologies</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --black: #0a0a0a;
            --gray: #1a1a1a;
            --text: #e0e0e0;
        }

        html { scroll-behavior: smooth; }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--black);
            color: var(--text);
            font-family: 'Assistant', sans-serif;
            line-height: 1.6;
        }

        /* ניווט קבוע, שקוף ואלגנטי */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(10px);
            display: flex;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
            z-index: 1000;
            border-bottom: 1px solid rgba(212, 175, 55, 0.15);
        }

        nav a {
            color: var(--text);
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            transition: 0.3s;
        }

        nav a:hover { color: var(--gold); }

        /* תמונת רקע ראשית - וילה מודרנית יוקרתית */
        header {
            height: 80vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(rgba(0,0,0,0.65), rgba(0,0,0,0.65)), 
                        url('https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&q=80') no-repeat center center/cover;
            text-align: center;
            border-bottom: 2px solid var(--gold);
            padding-top: 80px; /* מרווח עבור הניווט הקבוע */
        }

        /* --- תיקון הלוגו נהרס --- */
        h1 {
            font-family: 'Playfair Display', serif; /* פונט יוקרתי */
            font-size: 5rem; /* גודל מרשים */
            color: var(--gold); /* צבע זהב */
            margin: 0;
            letter-spacing: 12px; /* מרווח אותיות ענק למראה Luxury */
            text-transform: uppercase;
            font-weight: 700;
            text-shadow: 0 4px 15px rgba(0,0,0,0.6); /* צל עדין לעומק */
            line-height: 1;
        }

        .subtitle {
            font-family: 'Assistant', sans-serif;
            font-size: 1.3rem;
            letter-spacing: 6px; /* מרווח אותיות לכותרת המשנה */
            text-transform: uppercase;
            color: var(--text);
            margin-top: 15px;
            font-weight: 300;
            opacity: 0.9;
        }
        /* --------------------------------- */

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 100px 20px;
        }

        .feature-item {
            background: var(--gray);
            padding: 50px;
            border-radius: 20px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            text-align: center;
            margin-bottom: 80px;
