<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies</title>
    <style>
        :root { --gold: #c5a059; --dark: #0a192f; --card: #112240; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--dark); color: white; margin: 0; padding: 0; display: flex; flex-direction: column; align-items: center; }
        
        /* לוגו יוקרתי */
        .header { padding: 50px 0 30px 0; text-align: center; }
        .logo { font-size: 3.5rem; color: var(--gold); font-weight: bold; letter-spacing: 10px; margin: 0; }
        .logo span { border: 3px solid var(--gold); border-radius: 50%; padding: 0 10px; margin: 0 2px; }

        /* טאבים קבועים ומחוברים */
        .nav-container { width: 90%; max-width: 500px; background: var(--card); border: 1px solid var(--gold); border-radius: 15px 15px 0 0; display: flex; overflow: hidden; }
        .tab-btn { flex: 1; background: none; border: none; color: var(--gold); padding: 15px; cursor: pointer; font-size: 1rem; transition: 0.3s; border-bottom: 2px solid transparent; }
        .tab-btn.active { background: var(--gold); color: var(--dark); font-weight: bold; }
        .tab-btn:not(:last-child) { border-left: 1px solid rgba(197, 160, 89, 0.3); }

        /* כרטיס תוכן צמוד לטאבים */
        .content-area { width: 90%; max-width: 500px; background: var(--card); border: 1px solid var(--gold); border-top: none; border-radius: 0 0 15px 15px; overflow: hidden; }
        .card { display: none; }
        .card.active { display: block; animation: fadeIn 0.4s ease; }
        
        .card img { width: 100%; height: 350px; object-fit: cover; }
        .card-body { padding: 30px; text-align: center; }
        
        h2 { color: var(--gold); margin: 0 0 15px 0; font-size: 1.8rem; }
        p { color: #8892b0; line-height: 1.7; font-size: 1.1rem; margin: 0; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="header">
        <h1 class="logo">FOC<span>U</span>S</h1>
    </div>

    <div class="nav-container">
        <button class="tab-btn active" onclick="showTab(event, 'face')">Face ID</button>
        <button class="tab-btn" onclick="showTab(event, 'keypad')">Keypads</button>
        <button class="tab-btn" onclick="showTab(event, 'monitor')">Monitoring</button>
    </div>

    <div class="content-area">
        <div id="face" class="card active">
            <img src="face-id.jpg.jpg" alt="Face ID">
            <div class="card-body">
                <h2>Smart Access</h2>
                <p>מערכות זיהוי פנים מתקדמות המבוססות על בינה מלאכותית לאבטחה מקסימלית וחוויית משתמש חלקה.</p>
            </div>
        </div>

        <div id="keypad" class="card">
            <img src="keypad.jpg.jpg" alt="Keypad">
            <div class="card-body">
                <h2>Secure Keypads</h2>
                <p>פתרונות נעילה חכמים המשלבים עיצוב אלגנטי עם טכנולוגיית אבטחה מהמתקדמות בעולם.</p>
            </div>
        </div>

        <div id="monitor" class="card">
            <img src="monitoring.jpg.jpg" alt="Monitoring">
            <div class="card-body">
                <h2>Smart Monitoring</h2>
                <p>ניטור רציף ושליטה חכמה מרחוק המעניקים שקט נפשי מלא לכל מבנה ארגוני.</p>
            </div>
        </div>
    </div>

    <script>
        function showTab(evt, id) {
            var i, cards, buttons;
            cards = document.getElementsByClassName("card");
            for (i = 0; i < cards.length; i++) { cards[i].classList.remove("active"); }
            
            buttons = document.getElementsByClassName("tab-btn");
            for (i = 0; i < buttons.length; i++) { buttons[i].classList.remove("active"); }
            
            document.getElementById(id).classList.add("active");
            evt.currentTarget.classList.add("active");
        }
    </script>
</body>
</html>
