<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Technologies | Home Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --gold: #c5a059; --dark-bg: #050a14; --panel: #0d1626; }
        body { font-family: 'Montserrat', sans-serif; background-color: var(--dark-bg); color: white; margin: 0; padding: 0; overflow-x: hidden; }

        header { padding: 45px 0; text-align: center; border-bottom: 1px solid rgba(197, 160, 89, 0.2); background: linear-gradient(to bottom, #0a111f, var(--dark-bg)); }
        .logo-container { display: inline-block; }
        .logo-main { font-family: 'Cinzel', serif; font-size: 3.8rem; color: var(--gold); letter-spacing: 12px; line-height: 1; margin: 0; text-transform: uppercase; font-weight: 700; }
        
        .target-o { position: relative; display: inline-block; padding: 0 4px; margin: 0 -4px; }
        .target-o::after { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 62px; height: 62px; border: 2px solid var(--gold); border-radius: 50%; opacity: 1; box-shadow: 0 0 15px rgba(197, 160, 89, 0.4); }
        .target-o::before { content: ""; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 2px; height: 38px; background: var(--gold); z-index: 1; }
        .target-o span { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 38px; height: 2px; background: var(--gold); z-index: 1; display: block; }

        .logo-sub { font-size: 1.1rem; color: var(--gold); letter-spacing: 8px; margin-top: 18px; font-weight: 700; text-transform: uppercase; display: block; }

        nav { display: flex; justify-content: center; gap: 45px; margin-top: 35px; }
        .nav-link { color: white; text-decoration: none; font-size: 1.1rem; letter-spacing: 2px; opacity: 0.6; transition: 0.3s; cursor: pointer; border-bottom: 2px solid transparent; padding-bottom: 6px; text-transform: uppercase; font-weight: 600; }
        .nav-link.active { opacity: 1; color: var(--gold); border-bottom: 2px solid var(--gold); }

        .container { max-width: 1100px; margin: 60px auto; padding: 0 20px; }
        .hero-section { display: flex; align-items: center; gap: 50px; background: var(--panel); border: 1px solid rgba(197, 160, 89, 0.1); border-radius: 20px; overflow: hidden; box-shadow: 0 40px 100px rgba(0,0,0,0.5); display: none; }
        .hero-section.active { display: flex; animation: fadeIn 0.8s ease forwards; }

        .hero-image { flex: 1.2; height: 500px; overflow: hidden; }
        .hero-image img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); transition: 0.5s; }

        .hero-text { flex: 1; padding: 50px; text-align: right; }
        .hero-text h2 { font-family: 'Cinzel', serif; color: var(--gold); font-size: 2.5rem; margin-bottom: 15px; letter-spacing: 1px; font-weight: 700; }
        .highlight-text { color: var(--gold); font-size: 1.2rem; display: block; margin-bottom: 20px; font-weight: 700; }
        .hero-text p { font-size: 1.4rem; line-height: 1.8; color: #cbd5e0; font-weight: 400; margin: 0; }
        .hero-text strong { color: white; font-weight: 700; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        @media (max-width: 768px) {
            .hero-section { flex-direction: column; }
            .hero-image { height: 300px; width: 100%; }
            .hero-text { padding: 35px; text-align: center; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-main">F<span class="target-o">O<span></span></span>CUS</div>
        <div class="logo-sub">TECHNOLOGIES</div>
    </div>
    <nav>
        <div class="nav-link active" onclick="showContent(event, 'face')">FACE ID</div>
        <div class="nav-link" onclick="showContent(event, 'keypad')">KEYPADS</div>
        <div class="nav-link" onclick="showContent(event, 'monitor')">MONITORING</div>
    </nav>
</header>

<div class="container">
    <div id="face" class="hero-section active">
        <div class="hero-image">
            <img src="face-id.jpg.jpg" alt="Face ID">
        </div>
        <div class="hero-text">
            <h2>Smart Access</h2>
            <span class="highlight-text">הפתרון המושלם לבניינים ובתים פרטיים</span>
            <p>מערכת הרמטית לזיהוי פנים: הסוף לקודים ולוחות מקשים שנשחקים עם הזמן. הטכנולוגיה שלנו מעניקה שליטה מלאה ועמידות לאורך
